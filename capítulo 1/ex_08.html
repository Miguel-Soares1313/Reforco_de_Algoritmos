<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    Qual o valor da pizza?
    <input type="text" id="valor_input"><br><br>
    Quantos amigos vão pagar a pizza?
    <input type="text" id="amigos_input"><br><br>
    <button onclick="calcular()">#lovePizza</button>
</body>
</html>
<script>
    function calcular(){
        let valor = Number(valor_input.value);
        let amigos = Number(amigos_input.value);
        alert(`Cada um dos ${amigos} amigos vai pagar R$${valor / amigos}`)
    }
</script>
