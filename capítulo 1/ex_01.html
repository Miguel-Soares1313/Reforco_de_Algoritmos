<body>
    <button onclick="pare()">Pare</button><br><br>    
    <button onclick="pense()">Pense</button><br><br>
    <button onclick="siga()">Siga</button><br><br>
    <div id="mensagem"></div>
    
</body>

<script>
    function pare(){
        mensagem.innerHTML = `<h1 style = "color:red; background:black;">Pare e aguarde!</h1>`
    }

     function pense(){
        mensagem.innerHTML = `<h1 style = "color:yellow; background:black;">Pense se pode seguir ou se deve parar!</h1>`
    }

     function siga(){
        mensagem.innerHTML = `<h1 style = "color:green; background:black;">Pode seguir adiante!</h1>`
    }
</script>
