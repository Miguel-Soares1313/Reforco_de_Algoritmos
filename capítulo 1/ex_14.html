<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <input type="text" id="depositar_input">
    <button onclick="depositar()">Depositar</button><br><br>
    <input type="text" id="retirar_input">
    <button onclick="retirar()">Retirar</button>
</body>
</html>
<script>
    let saldo = 0;

    function depositar(){
        let valor_depositado = Number(depositar_input.value);
        saldo += valor_depositado;
        alert(`Depósito de R$${valor_depositado} efetuado! Saldo atual: R$${saldo}`)
    }
    function retirar(){
        let valor_retirado = Number(retirar_input.value);
        if(saldo <= 0){
            alert(`Você não possuí saldo!`)
        }
        else{
        saldo -= valor_retirado;
        alert(`Retirada de R$${valor_retirado} efetuada! Saldo atual: R$${saldo}`)
        }
    }
</script>
