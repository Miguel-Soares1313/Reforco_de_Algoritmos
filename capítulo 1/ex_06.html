<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    Digite sua rua/avenida/vila:
    <input type="text" id="nome_input"><br><br>
    Digite o número da sua casa:
    <input type="text" id="numero_input"><br><br>
    <button onclick="cadastrar()">Onde eu moro</button>
</body>
</html>
<script>
    function cadastrar(){
        let nome = (nome_input.value);
        let numero = (numero_input.value);
        alert(`Seu logradouro é ${nome}`);
        alert(`O número do seu logradouro é ${numero}`);
    }
</script>
