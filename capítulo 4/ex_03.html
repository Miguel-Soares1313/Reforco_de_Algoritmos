<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <button onclick="verificar()">Números cabalísticos</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        mensagem.innerHTML = ``
        for (let i = 1; i <= 30; i++) {
            if(i == 3 || i == 4 || i == 7 || i == 10 || i == 12){
                mensagem.innerHTML += ``
            }
            else{
                mensagem.innerHTML += `${i}<br>`
            }
        }
    }
</script>
