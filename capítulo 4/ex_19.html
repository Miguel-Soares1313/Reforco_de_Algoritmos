<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 19</title>
</head>
<body>
    <button onclick="analisar()">FizzBuzz</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function analisar(){
        mensagem.innerHTML = ``

            for (let i = 1; i <= 100; i++) {
            if(i % 3 == 0 && i % 5 == 0){
                mensagem.innerHTML += `${i} FizzBuzz<br>`
            }
            else if(i % 3 == 0){
                mensagem.innerHTML += `${i} Fizz<br>`
            }
            else if(i % 5 == 0){
                mensagem.innerHTML += `${i} Buzz<br>`
            }
            else{
                mensagem.innerHTML += `${i}<br>`
            }

        }
        }
</script>
