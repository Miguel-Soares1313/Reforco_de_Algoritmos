<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    Digite um número:
    <input type="text" id="quantidade_input"><br><br>
    Digite uma frase:
    <input type="text" id="frase_input"><br><br>
    <button onclick="repetir()">Papagaio</button>
</body>
</html>
<script>
    function repetir(){
        let quantidade = Number(quantidade_input.value);
        let frase = frase_input.value;
        let texto = "";

        for (let i = 0; i < quantidade; i++) {
            texto += frase; 
        }
        
        for (let i = 0; i < quantidade; i++) {
             alert(`${texto}`)
            
        }
    }
</script>
