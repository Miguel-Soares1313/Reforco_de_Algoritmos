<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    Qual a pessoa você mais ama na vida?
    <input type="text" id="pessoa_input"><br><br>
    O quanto você ama ela?
    <input type="text" id="quantidade_input" placeholder="Número inteiro!"><br><br>
    <button onclick="expressar()">Expressar amor</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function expressar(){
        let nome = pessoa_input.value;
        let quantidade = Number(quantidade_input.value);
        
        mensagem.innerHTML = ``
        for (let i = 0; i < quantidade; i++) {
            mensagem.innerHTML += `${i + 1} - ${nome}, eu te amo! Sempre lembre disso!<br>`;
            
        }
    }
</script>
