<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    Em qual número vai começar?
    <input type="text" id="inicio_input"><br><br>
    Em qual número vai terminar?
    <input type="text" id="final_input"><br><br>
    <button onclick="pares()">S2 Pares</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function pares(){
        let inicio = Number(inicio_input.value);
        let final = Number(final_input.value);
        mensagem.innerHTML = ``
        if(final < inicio){
            alert(`O final não pode ser menor que o começo!`)
        }
        else{
            for (let i = inicio; i <= final; i++) {
            if(i % 2 == 0){
                mensagem.innerHTML += `${i}<br>`
            }
        }
        }
       
    }
</script>
