<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    Quantas voltas o carro dará?
    <input type="text" id="quantidade_input"><br><br>
    <button onclick="iniciar()">Iniciar corrida!</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function iniciar(){
        let quantidade = Number(quantidade_input.value);

        for (let i = 1; i <= quantidade; i++) {
            mensagem.innerHTML += `Carro dando a ${i}ª volta<br>`
        }
        mensagem.innerHTML += `Corrida finalizada!`
    }
</script>
