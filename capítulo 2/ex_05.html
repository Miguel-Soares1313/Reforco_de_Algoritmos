<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    Qual a renda familiar?<br>
    <input type="text" id="renda_input"><br><br>
    Qual o valor da prestação?<br>
    <input type="text" id="prestacao_input"><br><br>
    <button onclick="verificar()">Verificar financiamento</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        let renda_familiar = Number(renda_input.value);
        let valor_prestacao = Number(prestacao_input.value);
        let divida = (valor_prestacao / renda_familiar * 100);
        if(divida > 30){
            mensagem.innerHTML = `A prestação corresponde a ${divida}% da renda familiar<br>
            <p style= "color:red">Será necessário complementar a renda familiar</p>`
            
        }
        else{
            mensagem.innerHTML = `A prestação corresponde a ${divida}% da renda familiar`
        }
    }
</script>
