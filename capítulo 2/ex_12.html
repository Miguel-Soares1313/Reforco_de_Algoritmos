<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 12</title>
</head>
<body>
    Nota 1:
    <input type="text" id="nota_um_input"><br><br>
    Nota 2:
    <input type="text" id="nota_dois_input"><br><br>
    <button onclick="verificar()">Verificar situação</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        let nota_um = Number(nota_um_input.value);
        let nota_dois = Number(nota_dois_input.value);
        let media = Number(nota_um + nota_dois / 2);
        if(media < 6){
            mensagem.innerHTML = `Tente outra vez!`
        }
        else{
            mensagem.innerHTML = `Parabéns, aluno aprovado!`
        }
    }
</script>
