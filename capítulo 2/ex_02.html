<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    Quantas latinhas de refri você bebe por dia? <br>
    <input type="text" id="refri_input"><br><br>

    <button onclick="calcular()">Quantos refris?</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function calcular(){
        let quantidade = Number(refri_input.value);
        let total = quantidade * 365;
        if(total > 500){
            mensagem.innerHTML = `Você bebeu ${total} latinhas de refri esse ano, Cuidado com a diabetes!`
        }
        else{
            mensagem.innerHTML = `Você bebeu ${total} latinhas de refri esse ano.`
        }
    }
</script>
