<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>
    Qual o valor da pizza?
    <input type="text" id="valor_input"><br><br>
    Quantos amigos vão pagar a pizza?
    <input type="text" id="amigos_input"><br><br>
    <button onclick="calcular()">Rola a Pizza?</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function calcular(){
        let valor = Number(valor_input.value);
        let amigos = Number(amigos_input.value);
        let total = (valor / amigos);
        if(total > 20){
            mensagem.innerHTML = `Cada um dos ${amigos} amigos vai pagar R$${total}. Deu ruim! Pizza muito cara!`
        }
        else{
            mensagem.innerHTML = `Cada um dos ${amigos} amigos vai pagar R$${total}`
        }
        
    }
</script>
