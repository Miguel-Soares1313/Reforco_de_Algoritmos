<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    Quantos homens vão no elevador?
    <input type="text" id="homem_input"><br><br>
    Quantas mulheres vão no elevador?
    <input type="text" id="mulher_input"><br><br>
    <button onclick="analisar()">Analisar peso</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function analisar(){
        let homens = Number(homem_input.value * 80);
        let mulheres = Number(mulher_input.value * 60);
        let total = Number(homens + mulheres);
        if(total > 800){
            mensagem.innerHTML = `Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${total}kg<br>
                                  <p style= "color:blue">Será necessário que alguém desça para que o elevador se movimente</p>`
        }
        else{
            mensagem.innerHTML =`Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${total}kg`
        }
    }
</script>
