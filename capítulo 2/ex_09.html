<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    Qual o valor de saldo na sua conta do banco?
    <input type="text" id="saldo_input"><br><br>
    <button onclick="verificar()">Verificar finaças</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        let saldo = Number(saldo_input.value);
        if(saldo == 0){
            mensagem.innerHTML = `Conta zerada`
        }
        else if(saldo < 0){
            mensagem.innerHTML = `<p style= "color:red">Está devendo!</p>`
        }
        else{
            mensagem.innerHTML = `<p style= "color:blue">Saldo positivo! sorriso</p>`
        }
    }
</script>
