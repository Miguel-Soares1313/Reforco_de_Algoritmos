<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13</title>
</head>
<body>
    Qual a altura do aluno?
    <input type="text" id="altura_input"><br><br>
    <button onclick="analisar()">Analisar estatura</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function analisar(){
        let altura = Number(altura_input.value);
        if(altura <= 1.65){
            mensagem.innerHTML= `Você pode ser piloto de corrida!`
        }
        else if(altura <= 1.80){
            mensagem.innerHTML= `Você pode ser jogador de futebol!`
        }
        else{
            mensagem.innerHTML= `Você pode ser jogador de vôlei ou basquete!`
        }
    }
</script>
