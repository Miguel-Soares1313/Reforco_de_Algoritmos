<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>
</head>
<body>
    Qual o peso da criança?
    <input type="text" id="peso_input"><br><br>
    <button onclick="verificar()">Verificar</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        let peso = Number(peso_input.value);
        if(peso < 13.5){
            mensagem.innerHTML= `Abaixo do peso`
        }
        else if(peso > 21.2){
            mensagem.innerHTML= `Acima do peso`
        }
        else if(peso == 18.3){
            mensagem.innerHTML= `Peso perfeito`
        }
        else{
            mensagem.innerHTML= `Peso na média`
        }
    }
</script>
