<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 15</title>
</head>
<body>
    Qual a temperatura?
    <input type="text" id="temperatura_input"><br><br>
    <button onclick="analisar()">Analisar Temperatura</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function analisar(){
        let temperatura = Number(temperatura_input.value)
        if(temperatura < 14){
            mensagem.innerHTML= `Congelando`
        }
        else if(temperatura < 21){
            mensagem.innerHTML= `Com frio`
        }
        else if(temperatura < 24){
            mensagem.innerHTML= `Confortável`
        }
        else if(temperatura < 31){
            mensagem.innerHTML= `Com calor`
        }
        else{
            mensagem.innerHTML= `Calor escaldante`
        }
    }
</script>
