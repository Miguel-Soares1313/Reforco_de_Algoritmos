<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    Qual a renda mensal?
    <input type="text" id="renda_input"><br><br>
    <button onclick="analisar()">Analisar Renda</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function analisar(){
        let renda = Number(renda_input.value);
        if(renda <= 250){
            mensagem.innerHTML= `Classe E`
        }
        else if(renda <= 900){
            mensagem.innerHTML= `Classe D`
        }
        else if(renda <= 2500){
            mensagem.innerHTML= `Classe C`
        }
        else if(renda <= 9500){
            mensagem.innerHTML= `Classe B`
        }
        else{
            mensagem.innerHTML= `Classe A`
        }
    }
</script>
