<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    Qual a nota do aluno?
    <input type="text" id="nota_input"><br><br>
    <button onclick="avaliar()">Avaliar aluno</button>
</body>
</html>
<script>
    function avaliar(){

        let nota = Number(nota_input.value);

        if(nota >= 0 && nota <= 10){
            alert(`Nota válida!`)
        }
        else{
            alert(`Onde já se viu nota menor que 0 e maior que 10?!`)
        }
    }
</script>
