<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    Qual a nota do aluno?
    <input type="text" id="nota_input"><br><br>
    Qual a frequência do aluno?
    <input type="text" id="freq_input"><br><br>
    <button onclick="analisar()">Analisar aluno</button><br><br>
    <div id="mensagem"></div><br>
</body>
</html>
<script>
    function analisar(){
        let nota = Number(nota_input.value);
        let frequencia = Number(freq_input.value);

        if(nota < 0 || nota > 10){
            mensagem.innerHTML = ``;
            alert(`Onde já se viu nota <0 ou >10?!`)
        }
        else if(frequencia < 0 || frequencia > 100){
            mensagem.innerHTML = ``;
            alert(`Onde já se viu frequência <0 ou >100?!`)
        }
        else{
            mensagem.innerHTML = "";
            if(nota >= 0 && nota < 6){
                mensagem.innerHTML += `Aluno ficou abaixo da média<br>`
            }
            else if(nota >= 6 && nota < 8){
                mensagem.innerHTML += `Aluno ficou na média<br>`
            }
            else{
                mensagem.innerHTML += `Aluno acima da média<br>`
            }

            if(frequencia >= 75){
                mensagem.innerHTML += `Aluno aprovado por frequência<br>`
            }
            else{
                mensagem.innerHTML += `Aluno reprovado por frequência<br>`
            }
        }
    }
</script>
