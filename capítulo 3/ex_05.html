<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    Qual a nota do aluno?
    <input type="text" id="nota_input"><br><br>
    <button onclick="avaliar()">Avaliar aluno</button>
</body>
</html>
<script>
    function avaliar(){
        let nota = Number(nota_input.value);

        if(nota < 6){
            alert(`Aluno não aprovado!`)
        }
        else if(nota >= 8.5 && nota <= 10){
            alert(`Aluno Exemplar!`)
        }
        else{
            alert(`Aluno comum e aprovado!`)
        }
    }
</script>
