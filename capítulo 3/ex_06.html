<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    Qual a altura inicial da seleção?
    <input type="text" id="min_input"><br><br>
    Qual a altura final da seleção?
    <input type="text" id="max_input"><br>
    <hr>
    Qual o nome do candidato?
    <input type="text" id="nome_input"><br><br>
    
    Qual a altura do candidato?
    <input type="text" id="altura_input"><br><br>
    <button onclick="verificar()">Verificar candidato</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        let altura_minima = Number(min_input.value);
        let altura_maxima = Number(max_input.value);
        let nome = (nome_input.value);
        let altura_candidato = Number(altura_input.value);

        if(altura_minima <= 1 || altura_minima > altura_maxima){
            alert(`Intervalo da altura de seleção é inválida! A altura inicial deve ser maior que 1 e a altura final deve ser maior que a altura inicial`)
        }
        else{
            if(altura_candidato >= altura_minima && altura_candidato <= altura_maxima){
                mensagem.innerHTML += `O candidato ${nome}, com altura de ${altura_candidato} metros, participará do processo de seleção de piloto<br><hr>`
            }
            else{
                mensagem.innerHTML += `Infelizmente, o candidato ${nome}, com altura de ${altura_candidato} metros, não atende os requisitos da seleção<br><hr>`
            }
        }
    }
</script>
