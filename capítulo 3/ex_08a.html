<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    Qual fruta chegou na mesa?
    <input type="text" id="fruta_input"><br><br>
    <button onclick="analisar()">Vai comer?</button>
</body>
</html>
<script>
    function analisar(){
        let fruta = fruta_input.value;
        if(fruta == "uva" || fruta == "abacaxi"){
            alert(`Sim, vai comer ${fruta}`);
        }
        else{
             alert(`A fruta ${fruta} ela não come`);
        }
    }
</script>
