<body>
    Qual a temperatura atual?
    <input type="text" id="temperatura_input"><br><br>
    <button onclick="analisar()">Analisar clima</button>
</body>
</html>
<script>
    function analisar(){
        let temperatura = Number(temperatura_input.value);
        if(temperatura < 21 || temperatura > 24){
            alert(`Alerta de desconforto!`);
            if(temperatura < 21){
                alert(`As pessoas vão ter hipotermia`)
            }
            else{
                alert(`As pessoas vão derreter`)
            }
        }
    }
</script>
