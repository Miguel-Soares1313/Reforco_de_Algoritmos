<script>
    function verificar(){
        let temperatura = Number(temperatura_input.value);

        if(temperatura >= 21 && temperatura <= 24){
            alert(`Temperatura confortável :D`);
        }
        else{
            alert(`emperatura DESCONFORTÁVEL :C`)
        }
    }
</script>
