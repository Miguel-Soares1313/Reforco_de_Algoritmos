<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício</title>
</head>

<body>
    Digite seu número da sorte:
    <input type="text" id="numero_input"><br><br>
    <button onclick="sortear()">Valendo!</button>
</body>

</html>
<script>
    function sortear() {
        let numero_usuario = Number(numero_input.value);
        let contador = 0
        let numero_aleatorio = 0
        if (numero_usuario <= 0 || numero_usuario > 100) {
            alert("Digite um número entre 1 e 100!")
        }
        else {
            while (numero_usuario != numero_aleatorio) {
                numero_aleatorio = Number(Math.floor(Math.random() * 101));
                contador++
            }

            alert(`foram necessários ${contador} sorteios até encontrar o número ${numero_usuario}.`)
        }

        
    }
</script>
