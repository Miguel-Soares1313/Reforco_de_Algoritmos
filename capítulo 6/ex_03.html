<script>

        let papel = `<img src="https://imgs.search.brave.com/oNSDYdwJE-jhd3B-wRHX36ox51o-_cvWMrom_Vg-O8o/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9jZG4u/Y3JlYXRlLnZpc3Rh/LmNvbS9hcGkvbWVk/aWEvc21hbGwvMzI0/NjQ0MTA2L3N0b2Nr/LXBob3RvLXRvcC12/aWV3LWVtcHR5LWNy/dW1wbGVkLWNyYWZ0/LXBhcGVyLXdoaXRl/LWJhY2tncm91bmQ" width="50">`
        let tesoura = `<img src="https://imgs.search.brave.com/X0uGAHNkoST582JVYtu41KmEqPg7_Y-GkbzdBonjfac/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMTQ5/OTE5MDI4NS9wdC9m/b3RvL3RhaWxvcnMt/c2Npc3NvcnMtd2l0/aC1hLWJsYWNrLWhh/bmRsZS1pc29sYXRl/ZC1vbi1hLXdoaXRl/LWJhY2tncm91bmQu/anBnP3M9NjEyeDYx/MiZ3PTAmaz0yMCZj/PXN6OWozZkVNYVVi/TVBVT21ZQ1F5anBM/R0swd2N2SVB3ZGQw/NEw5QUN1bkE9" width="50">`

        if (jogador_um == jogador_dois) {
            mensagem.innerHTML = `EMPATE! Jogue novamente!`
        }
        else if (jogador_um == 0 && jogador_dois == 1) {
            mensagem.innerHTML = `Jogador 1: -- Jogador 2:<br>
            ${pedra} - X - ${papel}<br>
            Vitória do jogador 2! Pois Papel cobre a pedra`
        }
        else if (jogador_um == 0 && jogador_dois == 2) {
            mensagem.innerHTML = `Jogador 1: -- Jogador 2:<br>
            ${pedra} - X - ${tesoura}<br>
            Vitória do jogador 1! Pois Pedra quebra a tesoura`
        }
        else if (jogador_um == 1 && jogador_dois == 2) {
            mensagem.innerHTML = `Jogador 1: -- Jogador 2:<br>
            ${papel} - X - ${tesoura}<br>
            Vitória do jogador 2! Pois Tesoura corta o papel`
        }
        else if (jogador_um == 1 && jogador_dois == 0) {
            mensagem.innerHTML = `Jogador 1: -- Jogador 2:<br>
            ${papel} - X - ${pedra}<br>
            Vitória do jogador 1! Pois Papel cobre a pedra`
        }
        else if (jogador_um == 2 && jogador_dois == 0) {
            mensagem.innerHTML = `Jogador 1: -- Jogador 2:<br>
            ${tesoura} - X - ${pedra}<br>
            Vitória do jogador 2! Pois Pedra quebra a tesoura`
        }
        else{
            mensagem.innerHTML = `Jogador 1: -- Jogador 2:<br>
            ${tesoura} - X - ${papel}<br>
            Vitória do jogador 1! Pois Tesoura corta o papel`
        }
    }
</script>
