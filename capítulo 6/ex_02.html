<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>

<body>
    <button onclick="avaliar()">Avaliar</button><br><br>
    <button onclick="equipe()">Equipe</button><br><br>
    <div id="mensagem"></div>
</body>

</html>
<script>
    let notas = [];
    let total = 0;
    function avaliar() {
        let nota = Number((Math.random() * 5).toFixed(1));

        notas.push(nota);
        total += nota;

        mensagem.innerHTML = `Nota recebida: ${nota}<br><br>`

        if (nota >= 0 && nota <= 0.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Sad_Face_Emoji_Icon_60x60.png"><br><br>`
        }
        else if (nota > 0.5 && nota <= 1.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Confused_Face_Emoji_Icon_60x60.png"><br><br>`
        }
        else if (nota > 1.5 && nota <= 3.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Unamused_Face_Emoji_Icon_60x60.png"><br><br>`
        }
        else if (nota > 3.5 && nota <= 4.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Slightly_Smiling_Face_Emoji_Icon_60x60.png"><br><br>`
        }
        else {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Smiling_Emoji_with_Eyes_Opened_Icon_60x60.png"><br><br>`
        }
    }

    function equipe() {
        let media = (total / notas.length).toFixed(1);
        console.log(media)
        mensagem.innerHTML = `Média geral: ${media}<br><br>`

        if (media >= 0 && media <= 0.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Sad_Face_Emoji_Icon_60x60.png">`
        }
        else if (media > 0.5 && media <= 1.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Confused_Face_Emoji_Icon_60x60.png">`
        }
        else if (media > 1.5 && media <= 3.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Unamused_Face_Emoji_Icon_60x60.png">`
        }
        else if (media > 3.5 && media <= 4.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Slightly_Smiling_Face_Emoji_Icon_60x60.png">`
        }
        else {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Smiling_Emoji_with_Eyes_Opened_Icon_60x60.png">`
        }

    }
</script>
