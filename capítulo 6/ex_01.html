<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>

<body>
    <button onclick="avaliar()">Avaliar</button><br><br>
    <div id="mensagem"></div>
</body>

</html>
<script>
    function avaliar() {
        let nota = Number((Math.random() * 5).toFixed(1));
        console.log(nota)
        mensagem.innerHTML = `Nota recebida: ${nota}<br><br>`

        if (nota >= 0 && nota <= 0.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Sad_Face_Emoji_Icon_60x60.png">`
        }
        else if (nota > 0.5 && nota <= 1.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Confused_Face_Emoji_Icon_60x60.png">`
        }
        else if (nota > 1.5 && nota <= 3.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Unamused_Face_Emoji_Icon_60x60.png">`
        }
        else if (nota > 3.5 && nota <= 4.5) {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Slightly_Smiling_Face_Emoji_Icon_60x60.png">`
        }
        else {
            mensagem.innerHTML += `<img src ="https://cdn.shopify.com/s/files/1/1061/1924/files/Smiling_Emoji_with_Eyes_Opened_Icon_60x60.png">`
        }
    }
</script>
