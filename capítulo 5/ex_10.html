<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    Qual linha de ônibus você pegou durante a semana?
    <input type="text" id="nome_input"><br><br>
    <button onclick="gravar()">Gravar busão</button><br><br>
    Pesquise uma linha:
    <input type="text" id="pesquisa_input"><br><br>
    <button onclick="pesquisar()">Pesquisar</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>

    let lista = [];

    function gravar(){
         let nome = nome_input.value;
        lista.push(nome)
        console.log(lista)
        let ultimo_indice = (lista.length - 1)
        mensagem.innerHTML = ``
        for (let i = ultimo_indice; i >= 0; i--) {
            mensagem.innerHTML += `${lista[i]}<br>`
        }
    }

    function pesquisar(){
        let nome = pesquisa_input.value;
        let contador = 0;
        let ordem = "";
        mensagem.innerHTML = ``
        for (let i = 0; i < lista.length; i++) {
            if(nome == lista[i]){
                contador++;
                ordem += `${i + 1}, `; 
            }
        }
        if(contador == 0){
            mensagem.innerHTML += `Você nunca pegou essa linha<br>`
        }
        else{
            mensagem.innerHTML +=`Você já pegou essa linha ${contador} vezes, nessa ordem: ${ordem}<br>`
        }
    }

</script>
