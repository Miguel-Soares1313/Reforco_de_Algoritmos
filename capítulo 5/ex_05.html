<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    Qual seu filme favorito?
    <input type="text" id="filme_input"><br><br>
    <button onclick="cadastrar()">Cadastrar Filme</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    let lista = [];

     function cadastrar() {
        let filme = filme_input.value;
        lista.push(filme)
        console.log(lista)

        for (let i = 0; i < lista.length; i++) {
            if(lista.length < 3){
                mensagem.innerHTML = `Total de filmes favoritos: ${lista.length}<br>
                Seu grande filme favorito: ${lista[0]}<br>
                Seu 3º filme favorito: Ainda não existe<br>
                Seu último favorito: ${lista[lista.length - 1]}`
            }
            else{
                mensagem.innerHTML = `Total de filmes favoritos: ${lista.length}<br>
                Seu grande filme favorito: ${lista[0]}<br>
                Seu 3º filme favorito: ${lista[2]}<br>
                Seu último favorito: ${lista[lista.length - 1]}`
            }
            
        }
    }
</script>
