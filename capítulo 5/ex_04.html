<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>

<body>
    Qual o filme que você mais gosta?
    <input type="text" id="filme_input"><br><br>
    <button onclick="cadastrar()">Cadastrar filme</button><br><br>
    <button onclick="verificar()">Ver favoritos</button><br><br>
    <div id="mensagem"></div>
</body>

</html>
<script>
    let lista = [];

    function cadastrar() {
        let filme = filme_input.value;
        lista.push(filme)
        console.log(lista)
    }

    function verificar() {
        mensagem.innerHTML = ``
        for (let i = 0; i < lista.length; i++) {
            mensagem.innerHTML += `${lista[i]}<br>`
        }
        mensagem.innerHTML += `Total ${lista.length}<br>
            O filme que mais gosta é ${lista[0]}<br>
            E desses, o que menos gosta é ${lista[lista.length - 1]}`
    }
</script>
