<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>

<body>
    Qual o destino da viagem?
    <input type="text" id="destino_input" placeholder="Destino de viagem"><br><br>
    <button onclick="adicionar()">Adicionar</button><br><br>
    <button onclick="primeira()">Primeira viagem</button>
    <button onclick="terceira()">Terceira viagem</button>
    <button onclick="ultima()">Ultima viagem</button><br><br>
    <div id="mensagem"></div>
</body>

</html>
<script>

    let lista = []

    function adicionar() {
        let destino = destino_input.value;
        lista.push(destino)
        console.log(lista)
    }

    function primeira() {
        if (lista.length == 0) {
            mensagem.innerHTML = `Ainda não viajou`
        }
        else {
            for (let i = 0; i < lista.length; i++) {
                mensagem.innerHTML = `${lista[0]}`
            }
        }
    }

    function terceira() {
        if (lista.length < 3) {
            mensagem.innerHTML = `Ainda fez a terceira viagem`
        }
        else {
            for (let i = 0; i < lista.length; i++) {
                mensagem.innerHTML = `${lista[2]}`
            }
        }
    }

    function ultima() {
         if (lista.length == 0) {
            mensagem.innerHTML = `Ainda não viajou`
        }
        else {
            for (let i = 0; i < lista.length; i++) {
                mensagem.innerHTML = `${lista[lista.length - 1]}`
            }
        }
    }
</script>
