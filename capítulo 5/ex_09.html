<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    Qual o nome dos seus projetos?
    <input type="text" id="nome_input"><br><br>
    <button onclick="registrar()">Registrar projeto</button><br><br>
    <button onclick="mostrar()">Mostar projetos</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>

    let lista = [];

    function registrar(){
        let nome = nome_input.value;
        lista.push(nome)
        console.log(lista)
        let quantidade = lista.length;
        mensagem.innerHTML = ``
        if(quantidade >= 0 && quantidade < 5){
            mensagem.innerHTML += `Você já fez ${quantidade} projetos. Por isso você é um profissional Junior<br><br>`
        }
        else if(quantidade >= 5 && quantidade < 13){
            mensagem.innerHTML += `Você já fez ${quantidade} projetos. Por isso você é um profissional Pleno<br><br>`
        }
        else{
            mensagem.innerHTML += `Você já fez ${quantidade} projetos. Por isso você é um profissional Sênior<br><br>`
        }
    }

    function mostrar(){
        let ultimo_indice = (lista.length - 1)
        mensagem.innerHTML = ``
        for (let i = ultimo_indice; i >= 0; i--) {
            mensagem.innerHTML += `${lista[i]}<br>`
        }
    }
</script>
