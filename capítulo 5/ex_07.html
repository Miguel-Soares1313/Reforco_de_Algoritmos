<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    Qual seu filme favorito?
    <input type="text" id="filme_input"><br><br>
    <button onclick="cadastrar()">Cadastrar Filme</button><br><br>
    <div id="mensagem"></div>
</body>
</html>
<script>
    let lista = [];

     function cadastrar() {
        let filme = filme_input.value;
        lista.push(filme)
        console.log(lista)
        mensagem.innerHTML = ``
        for (let i = 0; i < lista.length; i++) {
            if(i % 2 == 0){
                mensagem.innerHTML += `<span style="color: blue;">${lista[i]}</span><br>`
            }
            else{
                mensagem.innerHTML += `<span style="color: red;">${lista[i]}</span><br>`
            }
           
        }
    }
</script>
